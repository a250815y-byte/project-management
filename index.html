<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PM用語集クイズ</title>
<style>
  :root{
    --ink:#1f2a24;
    --paper:#f2ede1;
    --paper2:#e8e1d0;
    --line:#c9beA6;
    --accent:#3a5a40;
    --accent2:#8a5a3b;
    --bad:#a33b2e;
    --good:#3a5a40;
    --card:#fffdf7;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      linear-gradient(var(--paper2) 1px, transparent 1px);
    background-size: 100% 2.1em;
    font-family: "Yu Mincho","Hiragino Mincho ProN","Noto Serif JP",serif;
    color:var(--ink);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding: 24px 12px 60px;
  }
  .sheet{
    width:100%;
    max-width:680px;
  }
  header{
    text-align:center;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 3px double var(--ink);
  }
  header .eyebrow{
    font-size:12px;
    letter-spacing: 0.3em;
    color:var(--accent2);
    font-family: "Helvetica Neue", Arial, sans-serif;
  }
  header h1{
    font-size: 26px;
    margin: 6px 0 2px;
    letter-spacing: 0.05em;
  }
  header .sub{
    font-size:12.5px;
    color:#5c554a;
    font-family: "Helvetica Neue", Arial, sans-serif;
  }

  .statusbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size:13px;
    color:#5c554a;
    margin-bottom: 10px;
  }
  .progress-track{
    flex:1;
    height:6px;
    background:var(--paper2);
    border:1px solid var(--line);
    margin: 0 12px;
    position:relative;
  }
  .progress-fill{
    position:absolute; top:0; left:0; bottom:0;
    background: var(--accent);
    width:0%;
    transition: width .25s ease;
  }
  .score{
    font-variant-numeric: tabular-nums;
    white-space:nowrap;
  }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    box-shadow: 0 1px 0 var(--line), 0 8px 20px -14px rgba(0,0,0,.4);
    padding: 26px 24px 22px;
    position:relative;
  }
  .card::before{
    content:"";
    position:absolute;
    top:8px; left:8px; right:8px; bottom:8px;
    border:1px solid var(--line);
    pointer-events:none;
    opacity:.5;
  }
  .qnum{
    font-family:"Helvetica Neue", Arial, sans-serif;
    font-size:11px;
    letter-spacing:.2em;
    color:var(--accent2);
    margin-bottom: 10px;
  }
  .question{
    font-size: 17px;
    line-height: 1.85;
    margin-bottom: 22px;
    min-height: 90px;
  }
  .choices{
    display:grid;
    gap:10px;
  }
  .choice{
    text-align:left;
    font-family: inherit;
    font-size: 15px;
    padding: 12px 16px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink);
    cursor:pointer;
    display:flex;
    align-items:center;
    gap: 12px;
    transition: background .15s ease, border-color .15s ease, transform .1s ease;
  }
  .choice .mark{
    font-family:"Helvetica Neue", Arial, sans-serif;
    font-size:11px;
    color:var(--accent2);
    border:1px solid var(--accent2);
    width:20px; height:20px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .choice:hover:not(:disabled){
    background: var(--paper2);
    border-color: var(--accent);
  }
  .choice:disabled{ cursor:default; }
  .choice.correct{
    background: #e5ede4;
    border-color: var(--good);
    color: var(--good);
  }
  .choice.correct .mark{ border-color:var(--good); color:var(--good);}
  .choice.wrong{
    background: #f3e5e2;
    border-color: var(--bad);
    color: var(--bad);
  }
  .choice.wrong .mark{ border-color:var(--bad); color:var(--bad);}

  .feedback{
    margin-top:16px;
    font-family:"Helvetica Neue", Arial, sans-serif;
    font-size:13px;
    min-height: 20px;
    color: var(--accent2);
  }
  .footer-row{
    margin-top:18px;
    display:flex;
    justify-content:flex-end;
  }
  button.next{
    font-family:"Helvetica Neue", Arial, sans-serif;
    font-size:13px;
    letter-spacing:.05em;
    background: var(--ink);
    color: var(--paper);
    border:none;
    padding: 10px 22px;
    cursor:pointer;
    visibility:hidden;
  }
  button.next.show{ visibility:visible; }
  button.next:hover{ background: var(--accent); }

  .result{
    text-align:center;
    padding: 40px 24px;
  }
  .result .big{
    font-size:48px;
    margin: 6px 0 4px;
  }
  .result .label{
    font-family:"Helvetica Neue", Arial, sans-serif;
    font-size:12px;
    letter-spacing:.2em;
    color:var(--accent2);
  }
  .result p.msg{
    margin: 18px 0 26px;
    font-size:15px;
    line-height:1.8;
  }
  .result .actions{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .result button, .startbtn{
    font-family:"Helvetica Neue", Arial, sans-serif;
    font-size:13px;
    background: var(--ink);
    color: var(--paper);
    border:none;
    padding: 12px 22px;
    cursor:pointer;
  }
  .result button.secondary{
    background:transparent;
    color:var(--ink);
    border:1px solid var(--ink);
  }
  .result button:hover, .startbtn:hover{ background: var(--accent); }

  .missed-list{
    text-align:left;
    margin: 0 0 26px;
    font-size: 13.5px;
    line-height:1.8;
    max-height: 260px;
    overflow-y:auto;
    border:1px solid var(--line);
    padding: 12px 16px;
    background: var(--card);
  }
  .missed-list div{ margin-bottom:6px; }
  .missed-list b{ color:var(--bad); }

  .start-screen{
    text-align:center;
    padding: 30px 20px;
  }
  .start-screen h2{ font-size:19px; margin-bottom:8px; }
  .start-screen p{ font-size:14px; color:#5c554a; line-height:1.8; margin-bottom:22px;}
  select{
    font-family:"Helvetica Neue", Arial, sans-serif;
    font-size:14px;
    padding:8px 12px;
    border:1px solid var(--ink);
    background:var(--card);
    margin-bottom:20px;
  }
  @media (max-width:480px){
    .question{ font-size:15.5px; }
    .choice{ font-size:14px; }
  }
</style>
</head>
<body>
<div class="sheet">
  <header>
    <div class="eyebrow">STUDY DECK</div>
    <h1>プロジェクトマネジメント用語集クイズ</h1>
    <div class="sub">説明文から正しい用語を四択で選ぶ一問一答形式</div>
  </header>

  <div id="app"></div>
</div>

<script>
const TERMS = [
["PMBOK","Project Management Body of Knowledge。米国PMIが体系化したプロジェクトマネジメントの知識体系。世界標準として広く参照される。"],
["PMBOK6","PMBOK第6版。5つのプロセス群・10の知識エリア・49のプロセスを軸とした、プロセス中心の体系。"],
["PMBOK7","PMBOK第7版。プロセス中心から原則中心へ転換し、12のプロジェクト原則と8つのパフォーマンスドメインで構成される。"],
["共通フレーム2013","IPAが策定した、ソフトウェアの企画から開発・運用・保守・廃棄までの作業項目を共通の物差しで定義した日本の標準。発注者と受注者の認識齟齬を防ぐ。"],
["テーラリング","標準のプロセスや手法を、プロジェクトの規模・特性・環境に合わせて取捨選択・調整すること。"],
["プロジェクト","独自の成果物やサービスを創出するために実施される、有期性（始まりと終わりがある）の業務。"],
["プロジェクトマネジメント","プロジェクトの要求事項を満たすために、知識・スキル・ツール・技法を諸活動へ適用すること。"],
["PM：プロジェクトマネジャー","プロジェクトの目標達成に責任を持ち、計画・実行・統制を主導する責任者。"],
["PMI","Project Management Institute。プロジェクトマネジメントの普及・標準化を担う米国の非営利団体。PMBOKやPMP資格を提供。"],
["リーダーシップ","チームを目標に向けて動機づけ、方向性を示し、まとめあげる影響力・指導力。"],
["動機付け","メンバーが自発的に業務へ取り組むよう、内的・外的要因を通じて意欲を高めること。"],
["コンフリクト管理","利害・意見の対立（コンフリクト）を認識し、建設的に解消・調整するマネジメント活動。"],
["ステークホルダー","プロジェクトの意思決定・活動・成果から影響を受ける、あるいは影響を及ぼす利害関係者。"],
["ウォーターフォール開発","要件定義・設計・実装・テストなどの工程を上流から下流へ順番に進める開発手法。"],
["アジャイル開発","短い反復（イテレーション）を繰り返し、変化に柔軟に対応しながら段階的に開発を進める手法。"],
["プロトタイピング","試作品（プロトタイプ）を早期に作成し、要求の確認や検証を行いながら開発を進める手法。"],
["スポンサー","プロジェクトに資金やリソースを提供し、組織的な支援と意思決定の後ろ盾を担う立場の人。"],
["リスク","発生すると目標に影響を与える不確実な事象や状態。マイナス（脅威）とプラス（好機）の両面がある。"],
["OPM","Organizational Project Management。組織戦略を、プロジェクト・プログラム・ポートフォリオの管理を通じて遂行する統合的な枠組み。"],
["プログラムマネジメント","相互に関連する複数のプロジェクトを束ねて統合管理し、個別では得られない便益を実現する管理。"],
["ポートフォリオマネジメント","組織戦略の達成に向け、プロジェクトやプログラム群を選定・優先順位付け・最適配分する管理。"],
["成果物（デリバラブル）","プロセスやフェーズ、プロジェクトを完了するために生成される、検証可能な製品・サービス・結果。"],
["制約条件","コスト・スケジュール・スコープ・品質・資源・リスクなど、プロジェクトの選択肢を限定する要因。"],
["前提条件","計画策定時に証明なしで真とみなす事項。誤ればリスクとなるため明示・管理する。"],
["トリプルコンストレイント","スコープ・コスト・時間（および品質）が相互に影響し合う制約関係。一つを変えれば他に波及する。"],
["ファシリテーション","会議やワークショップで参加者の合意形成や創発を中立的に促進する技法。"],
["交渉","利害の異なる当事者間で合意に至るよう調整するスキル。調達やコンフリクト解決で重要。"],
["チームビルディング","メンバー間の信頼と協働を高め、チームの一体感とパフォーマンスを向上させる活動。"],
["5つのプロセス群","立ち上げ・計画・実行・監視コントロール・終結の5つ。プロジェクトを構成するプロセスの分類（PMBOK6）。"],
["立ち上げプロセス","プロジェクトやフェーズの開始を正式に承認し、立ち上げるためのプロセス群。"],
["プロジェクト憲章","プロジェクトの存在を公式に認可し、PMに権限を与える文書。目的・概要・主要関係者などを記載。"],
["ステークホルダーリスト","プロジェクトに関わる利害関係者を洗い出し、その役割・関心・影響度などを整理した一覧。"],
["マイルストン","プロジェクトにおける重要な節目や到達点。期間を持たず、特定の時点を表す。"],
["ステークホルダー 権力/関心度グリッド","ステークホルダーを「権力（影響力）」と「関心度」の2軸で分類し、関与方針を検討する分析手法。"],
["計画プロセス","プロジェクトの目標達成に向けたスコープ・スケジュール・コストなどの計画を策定するプロセス群。"],
["スコープ","プロジェクトで実施する作業の範囲、および成果物に含まれる機能や要素の範囲。"],
["WBS","Work Breakdown Structure。成果物や作業を階層的に分解し、管理可能な単位へ細分化した構造図。"],
["アクティビティ","WBSの最下層であるワークパッケージを構成する、スケジュール上の個々の作業要素。"],
["ガントチャート","作業項目を縦軸、時間を横軸にとり、各作業の期間や進捗を横棒で示す日程表。"],
["クリティカルパス","プロジェクト全体の所要期間を決定づける、最も余裕のない一連の作業経路。遅れが全体遅延に直結する。"],
["PERT","Program Evaluation and Review Technique。作業の前後関係と所要時間から、日程や所要期間を分析する手法。楽観・最可能・悲観の3点見積もりを用いる。"],
["フロート","作業の余裕時間（スラック）。全体スケジュールに影響を与えずに遅らせられる時間の幅。"],
["クラッシング","資源を追加投入してクリティカルパス上の作業を短縮し、工期を圧縮する日程短縮技法。"],
["類推見積もり","過去の類似プロジェクトの実績を基に、規模・コスト・期間を概算する見積もり手法。"],
["QC","Quality Control（品質管理）。成果物が品質基準を満たしているかを検査・測定し、是正する活動。"],
["リスク評価 確率影響マトリックス","リスクを「発生確率」と「影響度」の2軸で評価し、優先的に対応すべきリスクを特定する手法。"],
["マイナスリスク 回避 転嫁 軽減 受容","脅威（マイナスリスク）への対応戦略。発生要因を取り除く回避、第三者へ移す転嫁、影響を抑える軽減、あえて受け入れる受容。"],
["プラスリスク 活用 共有 強化 受容","好機（プラスリスク）への対応戦略。確実に取りに行く活用、他者と組む共有、発生確率や効果を高める強化、自然に任せる受容。"],
["請負契約","成果物の完成を約束し、その完成に対して報酬を支払う契約。受注者が完成責任を負う。"],
["準委任契約","成果物の完成ではなく、業務の遂行（労務の提供）を目的とする契約。完成責任を負わない。"],
["派遣契約","派遣元の労働者が派遣先の指揮命令下で業務に従事する契約。指揮命令権は派遣先にある。"],
["プロジェクトマネジメント計画書","各知識エリアの補助計画やベースラインを統合した、プロジェクト遂行の総合的な計画文書。"],
["ベースライン","スコープ・スケジュール・コストの承認済み基準値。実績と比較して差異を測る基準となる。"],
["スコープベースライン","承認されたスコープ記述書・WBS・WBS辞書から成る、スコープ管理の基準。"],
["ワークパッケージ","WBSの最下位の構成要素。コストや所要期間を見積もり・管理できる最小単位の成果物。"],
["デシジョンツリー分析","不確実な事象の確率と結果を枝分かれで表し、期待値から最適な選択肢を評価する手法。"],
["モンテカルロ分析","乱数による多数回シミュレーションで、スケジュールやコストの達成確率を定量評価する手法。"],
["ボトムアップ見積もり","WBSの下位要素ごとに見積もり、積み上げて全体を算出する精度の高い見積もり手法。"],
["パラメトリック見積もり","過去データと変数の統計的関係（単価×数量など）を用いて算出する見積もり手法。"],
["予備設定分析（コンティンジェンシー予備）","既知リスクに備えコスト・スケジュールに組み込む予備。マネジメント予備は未知リスク用。"],
["コミュニケーションマネジメント計画","誰に・何を・いつ・どの手段で情報伝達するかを定めた計画。チャネル数はn(n-1)/2で増加する。"],
["資源マネジメント","プロジェクトに必要な人的資源と物的資源を見積もり・取得・育成・管理する知識エリア。"],
["RACIチャート","作業ごとの責任分担を実行（R）・説明責任（A）・相談（C）・報告（I）で示す責任分担マトリックス。"],
["調達マネジメント","外部から製品・サービスを取得するための計画・実行・管理を扱う知識エリア。契約形態の選定を含む。"],
["実行プロセス","計画に基づき、人的資源やリソースを動員して作業を実施し、成果物を作り上げるプロセス群。"],
["形式知","文書・図表・マニュアルなど、言語化・体系化されて共有・伝達が可能な知識。"],
["暗黙知","経験や勘など、言語化が難しく個人に蓄積された主観的・身体的な知識。"],
["タックマンモデル","チームの発達段階を、形成期・混乱期・統一期・機能期（・散会期）の段階で説明するモデル。"],
["コンフリクト 撤退/回避 鎮静/適応 妥協/和解 強制/指示 協調/解決","対立への対処スタイル。問題から離れる撤退/回避、相手に譲る鎮静/適応、互いに譲歩する妥協/和解、力で押し通す強制/指示、双方が満足する解を探る協調/解決。"],
["RFI","Request For Information（情報提供依頼書）。発注者がベンダーに製品・サービスの情報提供を求める文書。"],
["RFP","Request For Proposal（提案依頼書）。発注者がベンダーに具体的な提案や見積もりを求める文書。"],
["品質保証（QA）","プロセスが品質基準を満たすよう監査・改善し、品質に対する信頼を確立する活動。QCと対をなす。"],
["監視コントロールプロセス","プロジェクトの進捗や成果を監視・測定し、計画との差異を是正するプロセス群。"],
["PDCA","Plan（計画）・Do（実行）・Check（評価）・Act（改善）のサイクルで継続的に業務を改善する管理手法。"],
["CCB：Change Control Board","変更管理委員会。プロジェクトの変更要求を審査し、承認・却下を判断する組織。"],
["スコープクリープ","正式な変更管理を経ずに、スコープが徐々に拡大していく好ましくない状態。"],
["EVM","Earned Value Management。出来高（アーンドバリュー）を用いてコストとスケジュールの進捗を定量的に管理する手法。"],
["終結プロセス","プロジェクトやフェーズを正式に完了・終了させ、成果物の引き渡しや教訓の整理を行うプロセス群。"],
["10の知識エリア","統合・スコープ・スケジュール・コスト・品質・資源・コミュニケーション・リスク・調達・ステークホルダーの各管理領域（PMBOK6）。"],
["49のプロセス","PMBOK6において、5つのプロセス群と10の知識エリアの組み合わせで定義される管理プロセスの総数。"],
["12のプロジェクト原則","PMBOK7で示された、プロジェクト運営の指針となる原則。スチュワードシップやチーム、価値などを含む。"],
["スチュワードシップ","誠実・敬意・配慮をもって、組織内外に対し責任ある管理者として振る舞うこと。PMBOK7の原則の一つ。"],
["システム思考","プロジェクトを相互に関連し合う要素の集合（システム）として捉え、全体最適の視点で扱う考え方。"],
["8つのパフォーマンスドメイン","PMBOK7で価値を生み出すために重要な活動領域。ステークホルダー・チーム・開発アプローチ・計画・プロジェクト作業・デリバリー・測定・不確実性。"],
["価値（バリュー）","PMBOK7が中核に据える概念。成果物そのものより、利害関係者にもたらす便益・成果を重視する。"],
["テーラリング（PMBOK7）","プロジェクトの状況に応じてアプローチ・手法・成果物を適応的に選択・調整する原則。"],
["プロジェクトマネジメント標準","PMBOK7の前半を成す、価値提供システムと12の原則を定義した中核部分。"],
["適応型（アダプティブ）","要求が流動的な状況で反復・漸進により柔軟に進める開発アプローチ。アジャイル等を含む。"],
["予測型（プレディクティブ）","要求が明確で安定した状況で、計画を前もって固めて進める開発アプローチ。"],
["ハイブリッド","予測型と適応型を組み合わせ、プロジェクトの特性に応じて使い分ける開発アプローチ。"],
["SIer","System Integrator。情報システムの企画・構築・運用を一括して請け負う事業者。"],
["CIO","Chief Information Officer（最高情報責任者）。経営の視点から情報システム戦略を統括する役職。"],
["ユーザー企業","情報システムを発注・利用する側の企業。SIerなどの提供側（ベンダー）と対になる立場。"],
["多段階見積もり","プロジェクトの進行に応じて段階的に精度を高めながら見積もりを行う方法。超上流では概算、詳細化に伴い精緻化する。"],
["IPA","情報処理推進機構。日本のIT政策を支える独立行政法人。共通フレームや各種ガイドライン、情報処理技術者試験を所管。"],
["ソフトウェアライフサイクル","ソフトウェアの企画・要件定義・開発・運用・保守・廃棄に至る一連の工程と期間。"],
["超上流","要件定義より前の、企画・経営戦略との整合や全体構想を固める最上流の工程。プロジェクトの成否を大きく左右する。"],
["PMO","Project Management Office。組織内のプロジェクトマネジメントを横断的に支援・標準化・統制する部門。"],
["要件定義","システム化の対象業務と利用者の要求を明確化し、満たすべき機能・非機能を定義する工程。"],
["非機能要件","性能・信頼性・セキュリティ・運用性など、機能以外でシステムが満たすべき品質特性の要求。"]
];

let quiz = [];
let idx = 0;
let score = 0;
let missed = [];
let answered = false;
let numQuestions = 20;

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildQuiz(n){
  const pool = shuffle(TERMS);
  const selected = pool.slice(0, n);
  return selected.map(([term,def])=>{
    const distractorPool = TERMS.filter(t=>t[0]!==term);
    const distractors = shuffle(distractorPool).slice(0,3).map(t=>t[0]);
    const choices = shuffle([term, ...distractors]);
    return { term, def, choices };
  });
}

const app = document.getElementById('app');

function renderStart(){
  app.innerHTML = `
    <div class="card">
      <div class="start-screen">
        <h2>用語集クイズ（全${TERMS.length}語）</h2>
        <p>用語の説明文が表示されるので、正しい用語を4つの選択肢から選んでください。<br>出題数を選んでスタートできます。</p>
        <div>
          <select id="qcount">
            <option value="10">10問</option>
            <option value="20" selected>20問</option>
            <option value="30">30問</option>
            <option value="${TERMS.length}">全${TERMS.length}問</option>
          </select>
        </div>
        <button class="startbtn" id="startBtn">はじめる</button>
      </div>
    </div>
  `;
  document.getElementById('startBtn').onclick = ()=>{
    numQuestions = parseInt(document.getElementById('qcount').value, 10);
    quiz = buildQuiz(numQuestions);
    idx = 0; score = 0; missed = [];
    renderQuestion();
  };
}

function renderStatus(){
  const pct = quiz.length ? (idx/quiz.length*100) : 0;
  return `
    <div class="statusbar">
      <span>問題 ${idx+1} / ${quiz.length}</span>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="score">正解 ${score}</span>
    </div>
  `;
}

function renderQuestion(){
  answered = false;
  const q = quiz[idx];
  const marks = ['A','B','C','D'];
  app.innerHTML = `
    ${renderStatus()}
    <div class="card">
      <div class="qnum">Q${idx+1}. 次の説明にあてはまる用語は？</div>
      <div class="question">${q.def}</div>
      <div class="choices">
        ${q.choices.map((c,i)=>`<button class="choice" data-choice="${c.replace(/"/g,'&quot;')}"><span class="mark">${marks[i]}</span><span>${c}</span></button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="footer-row"><button class="next" id="nextBtn">${idx+1 < quiz.length ? '次の問題へ →' : '結果を見る →'}</button></div>
    </div>
  `;
  document.querySelectorAll('.choice').forEach(btn=>{
    btn.addEventListener('click', ()=>handleAnswer(btn.dataset.choice, q));
  });
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    idx++;
    if(idx < quiz.length){ renderQuestion(); } else { renderResult(); }
  });
}

function handleAnswer(choice, q){
  if(answered) return;
  answered = true;
  const correct = choice === q.term;
  if(correct){ score++; } else { missed.push(q); }
  document.querySelectorAll('.choice').forEach(btn=>{
    btn.disabled = true;
    if(btn.dataset.choice === q.term){ btn.classList.add('correct'); }
    else if(btn.dataset.choice === choice){ btn.classList.add('wrong'); }
  });
  document.getElementById('feedback').textContent = correct ? '正解です。' : `不正解。正解は「${q.term}」でした。`;
  document.getElementById('nextBtn').classList.add('show');
}

function renderResult(){
  const total = quiz.length;
  const pct = Math.round(score/total*100);
  let msg;
  if(pct === 100) msg = '満点です。この調子で本番も自信を持って臨めます。';
  else if(pct >= 80) msg = 'よく覚えられています。間違えた用語だけ復習しましょう。';
  else if(pct >= 50) msg = 'あと少し。間違えた用語を中心にもう一周してみましょう。';
  else msg = 'まずは繰り返し出題して用語に慣れていきましょう。';

  app.innerHTML = `
    <div class="card">
      <div class="result">
        <div class="label">RESULT</div>
        <div class="big">${score} / ${total}</div>
        <div class="label">正答率 ${pct}%</div>
        <p class="msg">${msg}</p>
        ${missed.length ? `
          <div class="label" style="margin-bottom:8px;">間違えた用語 (${missed.length})</div>
          <div class="missed-list">
            ${missed.map(m=>`<div><b>${m.term}</b> — ${m.def}</div>`).join('')}
          </div>
        ` : ''}
        <div class="actions">
          <button id="retryAll">同じ範囲でもう一度</button>
          <button class="secondary" id="retryMissed" ${missed.length ? '' : 'disabled'}>間違えた問題だけ復習</button>
          <button class="secondary" id="backStart">出題数を変える</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('retryAll').onclick = ()=>{
    quiz = buildQuiz(numQuestions);
    idx = 0; score = 0; missed = [];
    renderQuestion();
  };
  document.getElementById('retryMissed').onclick = ()=>{
    if(!missed.length) return;
    quiz = missed.map(m=>{
      const distractorPool = TERMS.filter(t=>t[0]!==m.term);
      const distractors = shuffle(distractorPool).slice(0,3).map(t=>t[0]);
      return { term: m.term, def: m.def, choices: shuffle([m.term, ...distractors]) };
    });
    idx = 0; score = 0; missed = [];
    renderQuestion();
  };
  document.getElementById('backStart').onclick = renderStart;
}

renderStart();
</script>

</html>
